<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 5px; box-sizing: border-box; background-color: transparent; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { font-weight: bold; font-size: 14px; color: #31333F; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        #box_sug { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: none; z-index: 999999; max-height: 180px; overflow-y: auto; }
        .sug-item { padding: 12px 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .sug-item:hover { background: #f5f5f5; }
        button { width: 100%; background-color: rgb(255, 75, 75); color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <form id="main_work_form" onsubmit="sendData(event)">
        <div class="form-group">
            <label>Изделие:</label>
            <input type="text" id="inp_item" autocomplete="off" required>
            <div id="box_sug"></div>
        </div>
        <div class="form-group">
            <label>Операции:</label>
            <input type="text" id="inp_ops" required>
        </div>
        <div class="form-group">
            <label>Номера изделий:</label>
            <input type="text" id="inp_serials" required>
        </div>
        <button type="submit" id="submit_btn">➕ Рассчитать и добавить</button>
    </form>

    <script>
        // Streamlit автоматически заменит __ITEMS_PLACEHOLDER__ на реальный массив при загрузке
        const items = __ITEMS_PLACEHOLDER__;
        
        const inpItem = document.getElementById('inp_item');
        const boxSug = document.getElementById('box_sug');
        const inpOps = document.getElementById('inp_ops');
        const inpSerials = document.getElementById('inp_serials');
        const submitBtn = document.getElementById('submit_btn');

        inpItem.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            boxSug.innerHTML = '';
            if (!val) { boxSug.style.display = 'none'; return; }
            const m = items.filter(i => i.toLowerCase().startsWith(val));
            if (m.length) {
                m.forEach(i => {
                    const d = document.createElement('div');
                    d.className = 'sug-item';
                    d.textContent = i;
                    d.onclick = () => { inpItem.value = i; boxSug.style.display = 'none'; };
                    boxSug.appendChild(d);
                });
                boxSug.style.display = 'block';
            } else { boxSug.style.display = 'none'; }
        });

        document.addEventListener('click', (e) => { if (e.target !== inpItem) boxSug.style.display = 'none'; });

        function sendData(e) {
            e.preventDefault();
            
            submitBtn.textContent = "⏳ Расчёт и добавление...";
            submitBtn.disabled = true;

            // Передаем параметры в адресную строку родительского окна Streamlit
            const url = new URL(window.parent.location.href);
            url.searchParams.set('item', inpItem.value);
            url.searchParams.set('ops', inpOps.value);
            url.searchParams.set('serials', inpSerials.value);
            window.parent.location.href = url.toString();
        }
    </script>
</body>
</html>
